<!DOCTYPE html>
<html>
<head>
    <title>ML Model Comparator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #1F3864;
        }
        .upload-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input, select, button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button {
            background-color: #2E75B6;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #1F3864;
        }
    </style>
</head>
<body>
    <h1>ML Model Comparator</h1>
    <p>Upload any CSV dataset and compare all ML algorithms automatically</p>

    <div class="upload-box">
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <label>1. Upload your CSV file:</label>
            <input type="file" name="file" accept=".csv" required>

            <label>2. Enter your target column name:</label>
            <input type="text" name="target" placeholder="e.g. Survived, target, price" required>

            <label>3. Select problem type:</label>
            <select name="problem_type">
                <option value="classification">Classification</option>
                <option value="regression">Regression</option>
            </select>

            <button type="submit">Run Comparison</button>
        </form>
    </div>
</body>
</html>
